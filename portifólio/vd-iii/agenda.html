<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Confraria | Residencial Village Damha III</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .agenda-hero {
            padding: 12rem 4rem 6rem;
            text-align: center;
            background: linear-gradient(to bottom, rgba(10,31,26,0.8), var(--bg-primary)), url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&q=80&w=1600');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .week-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            margin: 4rem 0;
        }
        .week-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 1rem 2.5rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: var(--transition);
            min-width: 250px;
        }
        .week-btn.active {
            background: var(--accent);
            color: #000;
        }
        .truck-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 3rem;
            padding: 0 4rem 8rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .truck-card {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .truck-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
        }
        .truck-image {
            height: 250px;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .day-badge {
            position: absolute;
            top: 1.5rem; right: 1.5rem;
            background: var(--accent);
            color: #000;
            padding: 0.6rem 1.2rem;
            font-size: 0.75rem;
            font-weight: 750;
            text-transform: uppercase;
        }
        .truck-content {
            padding: 2.5rem;
            flex-grow: 1;
        }
        .truck-type {
            color: var(--accent);
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            display: block;
            margin-bottom: 0.8rem;
        }
        .truck-content h3 {
            font-size: 1.8rem;
            margin-bottom: 1.2rem;
        }
        .truck-content p {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 2rem;
        }
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(15px);
        }
        .modal-content {
            background: var(--bg-secondary);
            width: 90%;
            max-width: 900px;
            padding: 4rem;
            position: relative;
            border: 1px solid var(--glass-border);
            max-height: 90vh;
            overflow-y: auto;
        }
        .close-modal {
            position: absolute;
            top: 2rem; right: 2rem;
            font-size: 2.5rem;
            color: var(--accent);
            cursor: pointer;
        }
        .modal-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 5rem;
        }
        .menu-list { margin-top: 3rem; }
        .menu-item {
            display: flex;
            justify-content: space-between;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 1.2rem;
        }
        .menu-item .price { color: #fff; font-weight: 700; }
        @media (max-width: 900px) {
            .modal-grid { grid-template-columns: 1fr; }
            .modal-content { padding: 2rem; }
            .truck-grid { padding: 0 1.5rem 4rem; }
            .week-selector { flex-direction: column; gap: 1rem; }
            .week-btn { min-width: 100%; }
        }
        @media (max-width: 768px) {
            .agenda-hero { padding: 8rem 1.5rem 4rem; }
            .agenda-hero h1 { font-size: clamp(2.5rem, 10vw, 4rem) !important; }
            .truck-grid { grid-template-columns: 1fr; padding: 0 1.5rem 4rem; }
            .admin-fab { bottom: 1.5rem; right: 1.5rem; width: 56px; height: 56px; font-size: 1.5rem; }
            .admin-fab::after { display: none; }
        }
        
        /* Floating Action Button for Admin */
        .admin-fab {
            position: fixed;
            bottom: 3rem;
            right: 3rem;
            width: 70px;
            height: 70px;
            background: var(--accent);
            color: #000;
            border-radius: 50%;
            display: none; /* Default hidden */
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 0 10px rgba(212, 175, 55, 0.1);
            z-index: 1000;
            transition: var(--transition);
            font-size: 2rem;
            font-weight: 700;
        }
        .admin-fab:hover {
            transform: scale(1.1) rotate(90deg);
            background: #fff;
        }
        .admin-fab::after {
            content: 'ADD TRUCK';
            position: absolute;
            right: 100%;
            margin-right: 1.5rem;
            background: var(--bg-secondary);
            color: var(--accent);
            padding: 0.6rem 1.2rem;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            white-space: nowrap;
            border: 1px solid var(--glass-border);
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
        }
        .admin-fab:hover::after {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Mobile Nav Overlay -->
    <div class="mobile-nav" id="mobileNav">
        <a href="index.html">Início</a>
        <a href="agenda.html">Confraria</a>
        <a href="gallery.html">Galeria</a>
        <a href="login.html" class="mobile-cta">Área do Morador</a>
    </div>

    <header id="main-header">
        <nav class="nav-container">
            <a href="index.html" class="logo">VD|III</a>
            <ul class="nav-links">
                <li><a href="index.html">Início</a></li>
                <li><a href="agenda.html" class="active">Confraria</a></li>
                <li><a href="gallery.html">Galeria</a></li>
            </ul>
            <div id="userNav">
                <a href="login.html" class="btn btn-outline" id="loginBtn" style="padding: 0.8rem 1.5rem; font-size: 0.7rem;">Área do Morador</a>
            </div>
            <button class="hamburger" id="hamburger" aria-label="Menu" onclick="toggleMobileNav()">
                <span></span><span></span><span></span>
            </button>
        </nav>
    </header>

    <main>
        <section class="agenda-hero">
            <h1 style="font-size: clamp(3rem, 8vw, 6rem);">AGENDA<br><span style="color: var(--accent);">CONFRARIA</span></h1>
            <p style="margin-top: 2rem; color: var(--text-secondary);">Descubra quais sabores estarão no condomínio.</p>
        </section>

        <section class="week-selector">
            <button class="week-btn active" data-view="current">Esta Semana</button>
            <button class="week-btn" data-view="next">Próximas Semanas</button>
        </section>

        <div class="truck-grid" id="truck-grid"></div>
        
        <!-- Floating Button for Admin -->
        <a href="admin.html" class="admin-fab" id="adminFab">+</a>
    </main>

    <!-- Modal Detalhes do Truck -->
    <div class="modal" id="truck-modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-grid">
                <div class="modal-info">
                    <span class="truck-type" id="modal-type">CATEGORIA</span>
                    <h2 id="modal-title" style="font-size: 3rem; margin-bottom: 2rem;">Nome do Truck</h2>
                    <p id="modal-desc" style="color: var(--text-secondary); line-height: 1.8; font-size: 1.1rem;"></p>
                    <div class="menu-list">
                        <h4 style="color: var(--accent); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 2rem;">Destaques do Menu</h4>
                        <div id="modal-menu"></div>
                    </div>
                </div>
                <div class="modal-media">
                    <div id="modal-img-container" style="width: 100%; aspect-ratio: 1; background-size: cover; background-position: center; border-radius: 8px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        // Mobile Nav
        function toggleMobileNav() {
            const nav = document.getElementById('mobileNav');
            const btn = document.getElementById('hamburger');
            nav.classList.toggle('open');
            btn.classList.toggle('open');
            document.body.style.overflow = nav.classList.contains('open') ? 'hidden' : '';
        }
        function closeMobileNav() {
            const nav = document.getElementById('mobileNav');
            const btn = document.getElementById('hamburger');
            nav.classList.remove('open');
            btn.classList.remove('open');
            document.body.style.overflow = '';
        }
        document.getElementById('mobileNav').addEventListener('click', function(e) {
            if (e.target === this) closeMobileNav();
        });
    </script>

    <script>
        const isConfigured = firebaseConfig && firebaseConfig.apiKey && firebaseConfig.apiKey !== "SUA_API_KEY" && firebaseConfig.apiKey.length > 20;
        const truckGrid = document.getElementById('truck-grid');
        const modal = document.getElementById('truck-modal');
        const closeModal = document.querySelector('.close-modal');

        // Ensure admin exists
        let users = JSON.parse(localStorage.getItem('damha_users')) || [];
        if (!users.some(u => u.role === 'admin')) {
            users.unshift({ id: '1', name: 'Administrador', email: 'admin@damha.com', password: 'admin123', role: 'admin' });
            localStorage.setItem('damha_users', JSON.stringify(users));
        }

        let allTrucks = [];
        let viewMode = 'current';

        // Lógica de Sessão Dinâmica
        const currentUser = JSON.parse(localStorage.getItem('damha_currentUser'));
        const userNav = document.getElementById('userNav');
        if (currentUser) {
            let adminBtnHtml = currentUser.role === 'admin' ? `<a href="admin.html" class="btn btn-primary" style="padding: 0.6rem 1.2rem; font-size: 0.65rem; color: #000;">Painel Admin</a>` : '';
            userNav.innerHTML = `
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <span style="color: var(--accent); font-size: 0.8rem; font-weight: 600;">Olá, ${currentUser.name.split(' ')[0]}</span>
                    ${adminBtnHtml}
                    <button onclick="logout()" class="btn btn-outline" style="padding: 0.6rem 1.2rem; font-size: 0.65rem;">Sair</button>
                </div>
            `;
            
            if (currentUser.role === 'admin') {
                document.getElementById('adminFab').style.display = 'flex';
            }
        }
        function logout() { localStorage.removeItem('damha_currentUser'); window.location.reload(); }

        const getRelativeDate = (days) => {
            const d = new Date();
            d.setDate(d.getDate() + days);
            return d.toISOString().split('T')[0];
        };

        async function init() {
            let trucksToAdd = [];
            if (isConfigured) {
                firebase.initializeApp(firebaseConfig);
                try {
                    const snap = await firebase.firestore().collection("foodtrucks").get();
                    trucksToAdd = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                } catch(e) { console.warn("Firebase restricted, using local only."); }
            }
            
            let localTrucks = JSON.parse(localStorage.getItem('damha_foodtrucks')) || [];
            
            // Seed initial trucks if empty
            if (localTrucks.length < 2) {
                const getRelativeDate = (days) => {
                    const d = new Date(); d.setDate(d.getDate() + days);
                    return d.toISOString().split('T')[0];
                };
                const seeds = [
                    { id: 'seed1', name: 'PARRILLA STREET', type: 'ARTISAN BURGER', date: getRelativeDate(3), day: 'QUARTA', active: true, image: 'https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&q=80&w=800', shortDesc: 'Hambúrgueres artesanais grelhados na brasa.', longDesc: 'Referência em Rio Preto.', menu: [{item: 'Classic Burger', price: 'R$ 38'}] },
                    { id: 'seed2', name: "VITTORIO'S PIZZA", type: 'PIZZA NAPOLETANA', date: getRelativeDate(4), day: 'QUINTA', active: true, image: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&q=80&w=800', shortDesc: 'Pizzas napolitanas clássicas.', longDesc: 'Massa leve e ingredientes selecionados.', menu: [{item: 'Margherita DOC', price: 'R$ 52'}] }
                ];
                if (!localTrucks.some(t => t.name && t.name.includes('PARRILLA'))) {
                    localTrucks = [...localTrucks, ...seeds];
                    localStorage.setItem('damha_foodtrucks', JSON.stringify(localTrucks));
                }
            }
            
            // UNIFICAÇÃO: Apenas trucks reais vindos do banco/local
            allTrucks = [...trucksToAdd, ...localTrucks];
            
            // Remover duplicados (pelo ID) para segurança
            allTrucks = Array.from(new Map(allTrucks.map(item => [item['id'], item])).values());
            
            render();
        }

        function render() {
            truckGrid.innerHTML = '';
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const weekLimit = new Date(today);
            weekLimit.setDate(today.getDate() + 7);

            const filtered = allTrucks.filter(t => {
                // Filtro de Status: Apenas Ativos
                if (t.hasOwnProperty('active') && t.active === false) return false;
                
                const tDate = new Date(t.date + 'T12:00:00');
                if (viewMode === 'current') return tDate >= today && tDate < weekLimit;
                return tDate >= weekLimit;
            });

            if (filtered.length === 0) {
                truckGrid.innerHTML = `<p style="text-align:center; grid-column:1/-1; color:var(--text-secondary); padding: 4rem;">Tudo tranquilo por aqui. Nenhum truck programado para esta seleção.</p>`;
                return;
            }

            filtered.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(truck => {
                const card = document.createElement('div');
                card.className = 'truck-card';
                card.innerHTML = `<div class="truck-image" style="background-image: url('${truck.image}');"><div class="day-badge">${truck.day} (${new Date(truck.date+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})})</div></div><div class="truck-content"><span class="truck-type">${truck.type}</span><h3>${truck.name}</h3><p>${truck.shortDesc}</p></div>`;
                card.onclick = () => openModal(truck);
                truckGrid.appendChild(card);
            });
        }

        function openModal(truck) {
            document.getElementById('modal-title').textContent = truck.name;
            document.getElementById('modal-type').textContent = truck.type;
            document.getElementById('modal-desc').textContent = truck.longDesc;
            document.getElementById('modal-img-container').style.backgroundImage = `url(${truck.image})`;
            document.getElementById('modal-menu').innerHTML = (truck.menu || []).map(item => `<div class="menu-item"><span>${item.item}</span><span class="price">${item.price}</span></div>`).join('');
            modal.style.display = 'flex';
        }

        closeModal.onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; };
        document.querySelectorAll('.week-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                viewMode = btn.dataset.view;
                render();
            };
        });
        window.addEventListener('scroll', () => {
            const header = document.getElementById('main-header');
            if (window.scrollY > 50) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
        });
        init();
    </script>
</body>
</html>

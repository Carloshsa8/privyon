<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso - Alexandria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">Alexandria</a>
            <nav class="nav">
                <a href="index.html" class="nav-link">Início</a>
                <a href="cursos.html" class="nav-link">Cursos</a>
                <a href="contato.html" class="nav-link">Contato</a>
            </nav>
            <div class="header-right">
                <div id="authHeaderActions" class="auth-header-actions"></div>
                <button class="cart-btn" aria-label="Carrinho">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                    <span class="cart-count" id="cartCount">0</span>
                </button>
                <button class="hamburger" id="hamburgerBtn" onclick="toggleMobileMenu()">
                    <span class="hamburger-line"></span><span class="hamburger-line"></span><span class="hamburger-line"></span>
                </button>
            </div>
        </div>
    </header>

    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html" class="mobile-nav-link">Início</a>
        <a href="cursos.html" class="mobile-nav-link">Cursos</a>
        <a href="contato.html" class="mobile-nav-link">Contato</a>
        <a href="login.html" class="mobile-nav-link">Entrar</a>
    </div>

    <main class="course-detail-page" id="courseDetailPage"></main>

    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <a href="index.html" class="footer-logo">Alexandria</a>
                <p class="footer-copy">© 2026 Alexandria. Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header"><h3>Carrinho</h3><button class="close-cart" onclick="toggleCart()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
        <div class="cart-items" id="cartItems"><p class="cart-empty">Seu carrinho está vazio</p></div>
        <div class="cart-footer">
            <button class="clear-cart-btn" onclick="clearCart()">Limpar Carrinho</button>
            <div class="cart-total"><span>Total</span><span id="cartTotal">R$ 0,00</span></div>
            <a href="checkout.html" class="btn btn-primary btn-full">Finalizar Compra</a>
        </div>
    </div>
    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <script src="courses.js"></script>
    <script src="data.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        let courseId = parseInt(params.get('id'));
        if (!courseId || isNaN(courseId)) {
            courseId = parseInt(localStorage.getItem('selectedCourseId'));
        }
        const course = getCourseById(courseId);
        const page = document.getElementById('courseDetailPage');

        if (!course) {
            page.innerHTML = '<div class="container" style="padding:8rem 2rem;text-align:center;"><h1 style="color:var(--text-dim);">Curso não encontrado</h1><p style="margin-top:1rem;color:var(--text-dim);">Tente navegar pelos cursos novamente.</p><a href="cursos.html" class="btn" style="margin-top:2rem;">Ver Cursos</a></div>';
        } else {
            const instructor = DB.getUserById(course.instructorId);
            const rating = DB.getCourseRating(course.id);
            const reviews = DB.getReviewsByCourse(course.id);
            const enrolled = DB.getEnrollmentsByCourse(course.id).length;
            const totalLessons = course.modules.reduce((s, m) => s + m.lessons.length, 0);

            document.title = `${course.name} - Alexandria`;

            page.innerHTML = `
                <section class="course-detail-hero">
                    <div class="container">
                        <div class="course-detail-grid">
                            <div>
                                <span class="course-detail-tag">// ${course.category} · ${course.level}</span>
                                <h1 class="course-detail-title">${course.name}</h1>
                                <p class="course-detail-desc">${course.longDescription || course.description}</p>
                                <div class="course-detail-meta">
                                    <span class="course-detail-meta-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> ${rating.avg || course.rating} (${rating.count || 0} avaliações)</span>
                                    <span class="course-detail-meta-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> ${course.students + enrolled} alunos</span>
                                    <span class="course-detail-meta-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> ${course.duration}</span>
                                    <span class="course-detail-meta-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> ${totalLessons} aulas</span>
                                </div>
                            </div>
                            <div class="course-purchase-card">
                                <div class="course-purchase-price">${formatPrice(course.price)}</div>
                                ${course.originalPrice ? `<div class="course-purchase-original">${formatPrice(course.originalPrice)}</div>` : ''}
                                <button class="btn btn-primary btn-full" style="margin-top:1.5rem;" onclick="addToCart(${course.id})">Adicionar ao Carrinho</button>
                                <ul class="course-purchase-features">
                                    <li><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Acesso vitalício</li>
                                    <li><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> ${totalLessons} aulas em ${course.modules.length} módulos</li>
                                    <li><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Certificado de conclusão</li>
                                    <li><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Suporte com o professor</li>
                                    <li><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> 7 dias de garantia</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="course-content-section">
                    <div class="container">
                        <h2 class="section-title" style="margin-bottom:0.5rem;">Grade Curricular</h2>
                        <p style="color:var(--text-dim);margin-bottom:2rem;">${course.modules.length} módulos · ${totalLessons} aulas · ${course.duration}</p>
                        <div class="course-modules">
                            ${course.modules.map((mod, i) => `
                                <div class="course-module">
                                    <div class="course-module-header" onclick="this.nextElementSibling.classList.toggle('open')">
                                        <span class="course-module-title">Módulo ${i+1}: ${mod.title}</span>
                                        <span class="course-module-count">${mod.lessons.length} aulas</span>
                                    </div>
                                    <div class="course-module-lessons${i===0?' open':''}">
                                        ${mod.lessons.map(l => `
                                            <div class="course-lesson">
                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                                ${l.title}
                                                <span class="course-lesson-duration">${l.duration}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        ${instructor ? `
                        <h2 class="section-title" style="margin-top:3rem;">Instrutor</h2>
                        <div class="instructor-card">
                            <div class="instructor-avatar">${instructor.name.charAt(0)}</div>
                            <div>
                                <div class="instructor-name">${instructor.name}</div>
                                <div class="instructor-specialty">${instructor.specialty || ''}</div>
                                <p class="instructor-bio">${instructor.bio}</p>
                            </div>
                        </div>
                        ` : ''}

                        ${reviews.length > 0 ? `
                        <div class="reviews-section">
                            <h2 class="section-title">Avaliações</h2>
                            ${reviews.map(r => {
                                const user = DB.getUserById(r.userId);
                                return `
                                <div class="review-card">
                                    <div class="review-header">
                                        <span class="review-author">${user ? user.name : 'Aluno'}</span>
                                        <span class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                                    </div>
                                    <p class="review-text">${r.comment}</p>
                                    <span class="review-date">${r.date}</span>
                                </div>`;
                            }).join('')}
                        </div>
                        ` : ''}
                    </div>
                </section>
            `;
        }
    </script>
</body>
</html>

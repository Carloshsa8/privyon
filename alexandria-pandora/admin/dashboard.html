<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Alexandria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="../index.html" class="logo">Alexandria</a>
            <nav class="nav">
                <a href="dashboard.html" class="nav-link active">Painel</a>
                <a href="cursos.html" class="nav-link">Cursos</a>
                <a href="usuarios.html" class="nav-link">Usuários</a>
                <a href="vendas.html" class="nav-link">Vendas</a>
                <a href="configuracoes.html" class="nav-link">Config</a>
            </nav>
            <div class="header-right">
                <div id="authHeaderActions" class="auth-header-actions"></div>
                <button class="hamburger" id="hamburgerBtn" onclick="toggleMobileMenu()">
                    <span class="hamburger-line"></span><span class="hamburger-line"></span><span class="hamburger-line"></span>
                </button>
            </div>
        </div>
    </header>
    <div class="mobile-menu" id="mobileMenu">
        <a href="dashboard.html" class="mobile-nav-link">Dashboard</a>
        <a href="cursos.html" class="mobile-nav-link">Cursos</a>
        <a href="usuarios.html" class="mobile-nav-link">Usuários</a>
        <a href="vendas.html" class="mobile-nav-link">Vendas</a>
        <a href="configuracoes.html" class="mobile-nav-link">Configurações</a>
    </div>

    <div class="dashboard-layout">
        <aside class="dash-sidebar">
            <div class="dash-sidebar-header">
                <div class="dash-sidebar-role">Administrador</div>
                <div class="dash-sidebar-name" id="adminName">Admin</div>
            </div>
            <nav class="dash-sidebar-nav">
                <a href="dashboard.html" class="dash-nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    Dashboard
                </a>
                <a href="cursos.html" class="dash-nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    Cursos
                </a>
                <a href="usuarios.html" class="dash-nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                    Usuários
                </a>
                <a href="vendas.html" class="dash-nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    Vendas
                </a>
                <a href="configuracoes.html" class="dash-nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    Configurações
                </a>
            </nav>
        </aside>

        <main class="dash-content">
            <div class="dash-content-header">
                <h1 class="dash-page-title">Dashboard</h1>
                <p class="dash-page-desc">Visão geral da plataforma</p>
            </div>

            <div class="stats-grid" id="statsGrid"></div>

            <div class="chart-card">
                <h3 class="chart-title">Receita Mensal</h3>
                <div class="chart-bars" id="chartBars"></div>
            </div>

            <div class="chart-card">
                <h3 class="chart-title">Vendas Recentes</h3>
                <div class="data-table-wrapper">
                    <table class="data-table">
                        <thead><tr><th>Data</th><th>Aluno</th><th>Curso</th><th>Valor</th><th>Status</th></tr></thead>
                        <tbody id="recentSalesBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../courses.js"></script>
    <script src="../data.js"></script>
    <script src="../auth.js"></script>
    <script>
        if (!Auth.requireAuth(['admin'])) {}
        else {
            const user = Auth.getCurrentUser();
            document.getElementById('adminName').textContent = user.name;

            // Stats
            const stats = DB.getStats();
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-label">Receita Total</div><div class="stat-value">${new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(stats.totalRevenue)}</div><div class="stat-change up">↑ ${stats.totalSales} vendas</div></div>
                <div class="stat-card"><div class="stat-label">Alunos Ativos</div><div class="stat-value">${stats.totalStudents}</div></div>
                <div class="stat-card"><div class="stat-label">Cursos</div><div class="stat-value">${stats.totalCourses}</div></div>
                <div class="stat-card"><div class="stat-label">Matrículas</div><div class="stat-value">${stats.totalEnrollments}</div></div>
                <div class="stat-card"><div class="stat-label">Pendentes</div><div class="stat-value" style="color:var(--warning)">${stats.pendingSales}</div></div>
                <div class="stat-card"><div class="stat-label">Reembolsos</div><div class="stat-value" style="color:var(--danger)">${stats.refundedSales}</div></div>
            `;

            // Chart
            const monthly = DB.getMonthlySales();
            const maxRevenue = Math.max(...monthly.map(m => m.revenue), 1);
            document.getElementById('chartBars').innerHTML = monthly.map(m => `
                <div class="chart-bar-group">
                    <div class="chart-bar-value">${new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0}).format(m.revenue)}</div>
                    <div class="chart-bar" style="height:${(m.revenue/maxRevenue)*160}px"></div>
                    <div class="chart-bar-label">${m.label}</div>
                </div>
            `).join('');

            // Recent Sales
            const sales = DB.getSales().sort((a,b) => new Date(b.date)-new Date(a.date)).slice(0,10);
            document.getElementById('recentSalesBody').innerHTML = sales.map(s => {
                const u = DB.getUserById(s.userId);
                const c = getCourseById(s.courseId);
                const statusMap = {completed:'badge-success',pending:'badge-warning',refunded:'badge-danger'};
                const statusLabel = {completed:'Concluída',pending:'Pendente',refunded:'Reembolsado'};
                return `<tr>
                    <td>${new Date(s.date).toLocaleDateString('pt-BR')}</td>
                    <td>${u?u.name:'—'}</td>
                    <td>${c?c.shortName:'—'}</td>
                    <td style="color:var(--gold)">${new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(s.price)}</td>
                    <td><span class="badge ${statusMap[s.status]}">${statusLabel[s.status]}</span></td>
                </tr>`;
            }).join('');
        }
    </script>
</body>
</html>

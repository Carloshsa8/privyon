<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Cursos - Professor - Alexandria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="../index.html" class="logo">Alexandria</a>
            <nav class="nav">
                <a href="dashboard.html" class="nav-link">Painel</a>
                <a href="cursos.html" class="nav-link active">Meus Cursos</a>
                <a href="aulas.html" class="nav-link">Aulas</a>
            </nav>
            <div class="header-right">
                <div id="authHeaderActions" class="auth-header-actions"></div>
                <button class="hamburger" id="hamburgerBtn" onclick="toggleMobileMenu()">
                    <span class="hamburger-line"></span><span class="hamburger-line"></span><span class="hamburger-line"></span>
                </button>
            </div>
        </div>
    </header>
    <div class="mobile-menu" id="mobileMenu">
        <a href="dashboard.html" class="mobile-nav-link">Dashboard</a>
        <a href="cursos.html" class="mobile-nav-link">Meus Cursos</a>
        <a href="aulas.html" class="mobile-nav-link">Aulas</a>
    </div>

    <div class="dashboard-layout">
        <aside class="dash-sidebar">
            <div class="dash-sidebar-header"><div class="dash-sidebar-role">Professor</div><div class="dash-sidebar-name" id="profName">Professor</div></div>
            <nav class="dash-sidebar-nav">
                <a href="dashboard.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
                <a href="cursos.html" class="dash-nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Meus Cursos</a>
                <a href="aulas.html" class="dash-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>Gerenciar Aulas</a>
            </nav>
        </aside>

        <main class="dash-content">
            <div class="dash-content-header">
                <h1 class="dash-page-title">Meus Cursos</h1>
                <p class="dash-page-desc">Gerencie seus cursos publicados</p>
            </div>

            <div class="data-table-wrapper">
                <table class="data-table">
                    <thead><tr><th>Curso</th><th>Categoria</th><th>Preço</th><th>Alunos</th><th>Rating</th><th>Módulos</th><th>Status</th><th>Ações</th></tr></thead>
                    <tbody id="profCoursesBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="../courses.js"></script>
    <script src="../data.js"></script>
    <script src="../auth.js"></script>
    <script>
        if (!Auth.requireAuth(['professor'])) {}
        else {
            const user = Auth.getCurrentUser();
            document.getElementById('profName').textContent = user.name;

            const myCourses = getCoursesByInstructor(user.id);
            document.getElementById('profCoursesBody').innerHTML = myCourses.map(c => {
                const enrolled = DB.getEnrollmentsByCourse(c.id).length;
                const rating = DB.getCourseRating(c.id);
                const totalLessons = c.modules.reduce((s,m)=>s+m.lessons.length,0);
                return `<tr>
                    <td style="color:var(--text)">${c.name}</td>
                    <td><span class="badge badge-info">${c.category}</span></td>
                    <td style="color:var(--gold)">${formatPrice(c.price)}</td>
                    <td>${c.students + enrolled}</td>
                    <td style="color:var(--gold)">★ ${rating.avg || c.rating}</td>
                    <td>${c.modules.length} módulos · ${totalLessons} aulas</td>
                    <td><span class="badge ${c.published?'badge-success':'badge-warning'}">${c.published?'Publicado':'Rascunho'}</span></td>
                    <td class="actions-cell">
                        <a href="aulas.html?courseId=${c.id}" class="action-btn" style="text-decoration:none;">Gerenciar</a>
                        <a href="../curso-detalhe.html?id=${c.id}" class="action-btn" style="text-decoration:none;">Ver Página</a>
                    </td>
                </tr>`;
            }).join('') || '<tr><td colspan="8" style="text-align:center;color:var(--text-dim);padding:2rem;">Nenhum curso encontrado</td></tr>';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Alexandria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">Alexandria</a>
            
            <nav class="nav">
                <a href="index.html" class="nav-link">Início</a>
                <a href="cursos.html" class="nav-link">Cursos</a>
                <a href="contato.html" class="nav-link active">Contato</a>
            </nav>
            
            <button class="cart-btn" aria-label="Carrinho">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </header>

    <main class="contact-page">
        <div class="container">
            <div class="contact-container">
                <div class="contact-info">
                    <span class="section-tag">// Contato</span>
                    <h1 class="contact-title">Vamos <span class="text-gradient">conversar</span></h1>
                    <p class="contact-desc">Tem alguma dúvida? Quer saber mais sobre nossos cursos? Fale conosco!</p>
                    
                    <div class="contact-methods">
                        <div class="contact-method">
                            <div class="contact-icon">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                                </svg>
                            </div>
                            <div>
                                <div class="contact-label">Email</div>
                                <div class="contact-value">contato@alexandria.com</div>
                            </div>
                        </div>
                        <div class="contact-method">
                            <div class="contact-icon">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13 19.79 19.79 0 0 1 1.61 4.27 2 2 0 0 1 3.58 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.18 6.18l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                                </svg>
                            </div>
                            <div>
                                <div class="contact-label">WhatsApp</div>
                                <div class="contact-value">+55 (11) 99999-9999</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <form class="contact-form" onsubmit="return handleContact(event)">
                    <div class="form-row">
                        <input type="text" class="form-input" placeholder="Seu Nome" required>
                        <input type="email" class="form-input" placeholder="Seu Email" required>
                    </div>
                    <input type="text" class="form-input" placeholder="Assunto" required>
                    <textarea class="form-input" rows="5" placeholder="Sua Mensagem" required></textarea>
                    <button type="submit" class="btn btn-primary">Enviar Mensagem</button>
                </form>
            </div>
        </div>
    </main>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>Carrinho</h3>
            <button class="close-cart" onclick="toggleCart()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="cart-items" id="cartItems"><p class="cart-empty">Seu carrinho está vazio</p></div>
        <div class="cart-footer">
            <button class="clear-cart-btn" onclick="clearCart()">Limpar Carrinho</button>
            <div class="cart-total"><span>Total</span><span id="cartTotal">R$ 0,00</span></div>
            <a href="checkout.html" class="btn btn-primary btn-full">Finalizar Compra</a>
        </div>
    </div>
    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <script src="courses.js"></script>
    <script src="app.js"></script>
</body>
</html>
